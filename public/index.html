<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Charset & Viewport -->

    <meta

      content="virtual number, sms verification, receive sms online, buy number, otp service, RealSMS"
    />
    <meta name="author" content="RealSMS" />
    <meta name="theme-color" content="#000000" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Font -->
   <link
  href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

    <!-- Open Graph (WhatsApp, Facebook, etc) -->
    <meta property="og:title" content="RealSMS - Virtual Numbers & SMS Verification" />

    <meta name="twitter:card" content="summary_large_image" />

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React App Root -->
    <div id="root"></div>

    <script>
      // Hide loader once React mounts
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      });
    </script>
  </body>
</html>
